server:
  port: 8081
  # 优雅关闭 — 等待请求处理完毕再关闭
  shutdown: graceful

spring:
  application:
    name: iot-platform-service

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # Knife4j兼容Spring Boot 2.7.x

  # 优雅关闭超时时间
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:mysql://localhost:3306/iot_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1200000
      # 连接池健康检查
      keepalive-time: 60000
      connection-test-query: SELECT 1
      pool-name: IoTPlatformHikariPool

  redis:
    host: localhost
    port: 6379
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 30
        max-idle: 15
        min-idle: 8
        max-wait: 3000ms
    # 连接健康检查
    cluster:
      refresh:
        adaptive: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms

  # ============ Flyway 数据库版本迁移 ============
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
    encoding: UTF-8
    table: flyway_schema_history

  cloud:
    # ============ OpenFeign 配置 ============
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 3000
            logger-level: BASIC
          iot-notification-service:
            connect-timeout: 2000
            read-timeout: 5000
            logger-level: HEADERS
      compression:
        request:
          enabled: true
          mime-types: application/json
          min-request-size: 2048
        response:
          enabled: true
      sentinel:
        enabled: true

    # ============ Nacos 降级配置 ============
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# ============ Actuator 健康检查 ============
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# ============ Jasypt 配置加密 ============
jasypt:
  encryptor:
    password: iot-platform-jasypt-key   # 生产环境通过JVM参数传入：-Djasypt.encryptor.password=xxx
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

# ============ Knife4j API文档 ============
knife4j:
  enable: true
  setting:
    language: zh-CN

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.iot.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    "[com.iot.platform]": info
    "[com.iot.platform.feign]": info
    "[com.alibaba.nacos]": warn
    "[com.alibaba.cloud.sentinel]": info
    root: warn
  # 结构化日志格式（生产环境输出JSON便于ELK采集）
  pattern:
    console: '{"ts":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%-5level","logger":"%logger{36}","thread":"%thread","msg":"%msg","traceId":"%mdc{traceId:-}"}%n'
  file:
    name: ./logs/iot-platform.log
    max-size: 100MB
    max-history: 30

# ============ MQTT 配置 ============
mqtt:
  broker-url: tcp://localhost:1883
  client-id: iot-platform-server-${random.int}
  username: admin
  password: public
  default-topic: iot/devices/#
  qos: 1

# ============ 业务配置 ============
iot:
  heartbeat-miss-limit: 3
  heartbeat-interval: 30
  shadow-ttl-days: 7
  alert-converge-minutes: 10
  ota-retry-limit: 3
  # JWT密钥与过期时间
  jwt:
    secret: iot-platform-secret-key-2024-min-length-32
    expiration: 7200000
  # 登录限流：同一IP 5分钟内最多5次失败
  login:
    max-attempts: 5
    lock-minutes: 5
  # 通知服务直连URL（Nacos不可用时降级）
  notification:
    service-url: http://localhost:8082

# ============ XXL-Job 分布式调度 ============
xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: iot-platform-executor
      port: 9997
      logpath: ./logs/xxl-job
      logretentiondays: 30
    accessToken:

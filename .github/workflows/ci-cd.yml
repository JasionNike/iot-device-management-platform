# ============================================================
# 智能物联设备管理平台 — CI/CD Pipeline
# ============================================================
# 触发: push到main/master分支
# 流程: 编译 → Docker构建 → 部署到阿里云ECS
# 注: 单元测试需本地运行(依赖MySQL/Redis/RabbitMQ)
# ============================================================

name: IoT Platform CI/CD

on:
  push:
    branches: [ main, master ]

env:
  ALIYUN_HOST: 47.108.86.221
  ALIYUN_USER: root

jobs:
  # ========== 1. 编译 ==========
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Maven compile (skip tests — need DB)
        run: mvn compile -q

  # ========== 2. Docker 构建 ==========
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Build Backend Docker image
        run: docker build -t iot-backend:${{ github.sha }} .

  # ========== 3. 部署到阿里云ECS ==========
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Aliyun ECS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.ALIYUN_HOST }}
          username: ${{ env.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          script: |
            echo "Deploy triggered at $(date)"
            echo "Server: ${{ env.ALIYUN_HOST }}"
            echo "Commit: ${{ github.sha }}"
            # 生产环境部署脚本（根据实际情况调整）
            # cd /opt/iot-platform
            # docker-compose down
            # docker-compose up -d
